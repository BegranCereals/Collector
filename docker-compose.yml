version: "3"

services:
  collector:
    # "build: ." sagt Portainer: Nutze die Dockerfile im Git-Ordner, um das Image zu bauen
    build: .
    container_name: collector
    ports:
      - "8090:8090"
    volumes:
      # Sichert deine hochgeladenen Daten auf dem Server
      # In der server.js wird automatisch nach './data' gesucht, was hier gemountet ist
      - /opt/stacks/collector_data:/usr/src/app/data
    restart: unless-stopped
