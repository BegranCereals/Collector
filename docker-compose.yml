version: "3"

services:
  collector:
    image: node:18-alpine
    container_name: collector
    # Hier sagen wir dem Container klipp und klar, wo er arbeiten soll
    working_dir: /usr/src/app
    ports:
      - "8090:8090"
    volumes:
      # Wir holen deinen GitHub-Code (inkl. server.js) exakt in das Arbeitsverzeichnis
      - .:/usr/src/app
      # Wir sichern NUR den Unterordner 'data' auf deinem Server, damit die server.js unberührt bleibt!
      - /opt/stacks/collector_data:/usr/src/app/data
    # Der Container startet, installiert die Pakete im System und führt deine server.js aus
    command: sh -c "npm install express multer sqlite3 && node server.js"
    restart: unless-stopped
