version: "3"

services:
  collector:
    image: node:18-alpine
    container_name: collector
    working_dir: /app
    ports:
      - "8090:8090"
    volumes:
      # Wir sichern einfach den GESAMTEN Daten-Ordner sauber nach außen ab.
      # Das verhindert jegliche Pfad-Konflikte mit Docker und Linux!
      - /opt/stacks/collector_data:/app/data
    # Wir sagen Node jetzt, dass es die Datenbank und Uploads im /data-Ordner ablegen soll
    command: sh -c "npm install express multer sqlite3 && node server.js"
    restart: unless-stopped
